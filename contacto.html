<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | MenteConectada</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#dcd4e4] to-[#fafad2] font-sans">


  <nav class="w-full bg-white shadow mb-6">
    <div class="max-w-4xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <a href="login.html" class="text-indigo-700 font-bold text-lg">MenteConectada</a>
        <button id="nav-toggle" class="md:hidden text-2xl focus:outline-none" aria-label="Abrir menú">
          &#9776;
        </button>
        <ul id="nav-menu" class="hidden md:flex space-x-6 font-semibold">
          <li><a href="login.html" class="hover:text-indigo-700 transition">Inicio</a></li>
          <li><a href="contacto.html" class="hover:text-indigo-700 transition">Contacto</a></li>
        </ul>
      </div>

      <ul id="nav-menu-mobile" class="md:hidden hidden flex-col space-y-2 mt-2 font-semibold">
        <li><a href="login.html" class="block px-2 py-1 hover:bg-indigo-100 rounded">Inicio</a></li>
        <li><a href="contacto.html" class="block px-2 py-1 hover:bg-indigo-100 rounded">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <div class="max-w-xl mx-auto bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-2xl font-bold text-center mb-6 text-indigo-700">Contáctanos</h1>
    <form class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="nombre" class="text-sm">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre"
          class="p-2 rounded-md border-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
      </div>
      <div class="flex flex-col gap-1">
        <label for="correo" class="text-sm">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="tucorreo@ejemplo.com"
          class="p-2 rounded-md border-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
      </div>
      <div class="flex flex-col gap-1">
        <label for="mensaje" class="text-sm">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje"
          class="p-2 rounded-md border-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" required></textarea>
      </div>
      <button type="submit" class="bg-indigo-300 text-white font-bold px-4 py-2 rounded-md hover:bg-indigo-700 transition mx-auto w-1/2">Enviar</button>
    </form>
    <div class="mt-6 text-center text-gray-600">
      También puedes escribirnos a <a href="mailto:soportementeconectada@gmail.com" class="text-blue-600 underline">soportementeconectada@gmail.com</a>
    </div>
  </div>

  <script>
    // NAVBAR TOGGLE
    const navToggle = document.getElementById('nav-toggle');
    const navMenuMobile = document.getElementById('nav-menu-mobile');
    navToggle?.addEventListener('click', () => {
      navMenuMobile.classList.toggle('hidden');
    });
  </script>
</body>
</html>
