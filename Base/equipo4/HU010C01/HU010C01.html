<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Rapido</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4">
    <div class="max-w-2xl mx-auto">
        <!-- Encabezado -->
        <header class="bg-white rounded-lg p-4 mb-6 text-center shadow">
            <h1 class="text-xl font-bold text-gray-800">Contacto Rápido</h1>
            <p class="text-gray-600">Selecciona un perfil para contactar</p>
        </header>

        <!-- Perfil 1 -->
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center mr-3">
                        <span class="text-white font-medium">M</span>
                    </div>
                    <div>
                        <h3 class="font-medium text-gray-800">María González</h3>
                        <p class="text-gray-600 text-sm">Psicóloga especializada</p>
                    </div>
                </div>
                
                <!-- Campo de mensaje siempre visible -->
                <div class="flex items-center">
                    <input 
                        type="text" 
                        class="w-48 px-3 py-1 border border-gray-300 rounded-l focus:outline-none" 
                        placeholder="Escribe tu mensaje..."
                    >
                    <button class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-r text-sm">
                        Enviar
                    </button>
                </div>
            </div>
        </div>

        <!-- Perfil 2 -->
        <div class="bg-white rounded-lg shadow p-4 mb-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center mr-3">
                        <span class="text-white font-medium">J</span>
                    </div>
                    <div>
                        <h3 class="font-medium text-gray-800">Juan Pérez</h3>
                        <p class="text-gray-600 text-sm">Terapeuta con experiencia</p>
                    </div>
                </div>
                
                <!-- Campo de mensaje siempre visible -->
                <div class="flex items-center">
                    <input 
                        type="text" 
                        class="w-48 px-3 py-1 border border-gray-300 rounded-l focus:outline-none" 
                        placeholder="Escribe tu mensaje..."
                    >
                    <button class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-r text-sm">
                        Enviar
                    </button>
                </div>
            </div>
        </div>

        <!-- Perfil 3 -->
        <div class="bg-white rounded-lg shadow p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center mr-3">
                        <span class="text-white font-medium">A</span>
                    </div>
                    <div>
                        <h3 class="font-medium text-gray-800">Ana Rodríguez</h3>
                        <p class="text-gray-600 text-sm">Especialista en mindfulness</p>
                    </div>
                </div>
                
                <!-- Campo de mensaje siempre visible -->
                <div class="flex items-center">
                    <input 
                        type="text" 
                        class="w-48 px-3 py-1 border border-gray-300 rounded-l focus:outline-none" 
                        placeholder="Escribe tu mensaje..."
                    >
                    <button class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-r text-sm">
                        Enviar
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
