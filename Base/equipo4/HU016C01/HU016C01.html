<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Contacto</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos de redes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <h1>Mi Perfil</h1>
    </header>

    <section class="contacto">
        <h2>Contacto</h2>
        <p>Puedes compartir mi perfil en redes sociales:</p>

        <div class="redes">
            <a href="https://facebook.com/tuperfil" target="_blank" class="btn facebook">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            <a href="https://twitter.com/tuperfil" target="_blank" class="btn twitter">
                <i class="fab fa-x-twitter"></i> Twitter
            </a>
            <a href="https://instagram.com/tuperfil" target="_blank" class="btn instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://linkedin.com/in/tuperfil" target="_blank" class="btn linkedin">
                <i class="fab fa-linkedin-in"></i> LinkedIn
            </a>
        </div>
    </section>
</body>
</html>
