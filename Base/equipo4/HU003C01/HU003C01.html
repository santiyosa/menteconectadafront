<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación colaborador</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="contenedor">
        <form action="#" method="post">
            <h2>Enviar Mensaje</h2>
            <div class="grupo">
                <label for="destinatario">Destinatario</label>
                <input type="email" id="destinatario" name="destinatario" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="grupo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>
            <button type="submit" class="send-button">
                <span>Enviar</span>
                <svg class="send-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>
</body>
</html>
