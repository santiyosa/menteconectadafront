<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitudes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="nav-container">
      <div class="logo-container">
        <h2>Mis Solicitudes</h2>
      </div>
    </div>
  </header>

  <h1>Estado de Solicitudes</h1>

  <div class="request-container">

    <div class="request pendiente">
      <h3>Solicitud A</h3>
      <p>Detalle: Envío de documentos</p>
      <span class="estado">⏳ Pendiente</span>
      <p class="fecha">2025-08-25</p>
    </div>

    <div class="request aceptada">
      <h3>Solicitud B</h3>
      <p>Detalle: Activación de cuenta</p>
      <span class="estado">✅ Aceptada</span>
      <p class="fecha">2025-07-12</p>
    </div>

    <div class="request rechazada">
      <h3>Solicitud C</h3>
      <p>Detalle: Datos incompletos</p>
      <span class="estado">❌ Rechazada</span>
      <p class="fecha">2025-08-01</p>
    </div>

  </div>

</body>
</html>
