<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Andrea - Panel de Estadísticas</title>
    <link rel="stylesheet" href="/Equipo5-PanelEstadisticas/Contributors/Andrea/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7772e7',
                        secondary: '#e2e772',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Urbanist', sans-serif; }
    </style>

    <!-- Inicialización de tema ANTES de que cargue el contenido -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || 
            (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- Flowbite para Tabs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.js"></script>
</head>

                <a class="w-14 h-14 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-bold text-2xl no-underline" href="/Base/index.html">Z</a>
            </li>
            <li>
                <a href="/Equipo5-PanelEstadisticas/landing/index.html" class="flex items-center justify-center w-14 h-14 rounded-full bg-white dark:bg-gray-700 shadow hover:bg-secondary dark:hover:bg-[#5751a8] transition">
                    <span class="material-icons text-primary dark:text-[#a8a4e9] text-3xl">home</span>

            <li>

                    <img src="/Equipo5-PanelEstadisticas/landing/assets/images/MARIANA.png" alt="Mariana Icono" class="w-12 h-12 rounded-full object-cover" />

            </li>

    <header class="fixed left-32 top-5 right-5 h-20 bg-gradient-to-r from-primary to-secondary dark:from-[#5751a8] dark:to-[#b3b747] flex items-center gap-4 px-8 shadow-lg z-40 rounded-2xl">
        <h1 class="text-white text-3xl font-extrabold m-0">Panel de Estadísticas</h1>

        <!-- Botón de Modo Oscuro -->
        <button id="theme-toggle" type="button" class="ml-auto text-white bg-white/10 rounded-full p-2 transition-colors">
            <span class="material-icons dark:hidden">light_mode</span>
            <span class="material-icons hidden dark:block">dark_mode</span>
        </button>
    </header>
    <div class="galeria">
        <div class="imagen1">
            <img id="imagen1" src="/Equipo5-PanelEstadisticas/Contributors/Andrea/images/img1 (1).jpg" alt="Imagen 1">
        </div>
        <div class="imagen2">
            <img id="imagen2" src="/Equipo5-PanelEstadisticas/Contributors/Andrea/images/img2 (2).jpg" alt="Imagen 2">
        </div>

            <img id="imagen3" src="/Equipo5-PanelEstadisticas/Contributors/Andrea/images/img3 (3).jpg" alt="Imagen 3">
        </div>
    </div>
     <p class="frase-final">“Cuidar tu salud mental también es una forma de amor propio.” 💚</p>
     <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('theme-toggle');
            toggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    localStorage.setItem('color-theme', 'light');
                }
            });
        });
    </script>
</body>
